<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>门神景区 · 管理后台登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:16px;padding:40px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.login-card h1{font-size:22px;text-align:center;margin-bottom:6px;color:#1e293b}
.login-card .sub{text-align:center;color:#64748b;font-size:13px;margin-bottom:30px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.form-group input{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-login:hover{opacity:.9}
.error{color:#dc2626;font-size:13px;margin-top:10px;text-align:center;display:none}
.loading{display:none;text-align:center;margin-top:10px;font-size:13px;color:#64748b}
</style>
</head>
<body>
<div class="login-card">
  <h1>🏛️ 门神景区 · 管理后台</h1>
  <div class="sub">Agent Hub 智能体运营中枢</div>
  <div class="form-group">
    <label>用户名</label>
    <input type="text" id="username" value="admin" placeholder="管理员用户名">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="管理员密码" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn-login" onclick="login()">登 录</button>
  <div class="error" id="errorMsg"></div>
  <div class="loading" id="loadingMsg">登录中...</div>
</div>
<script>
const API = window.location.origin + '/api/v1';

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!username || !password) { showError('请输入用户名和密码'); return; }

  document.getElementById('loadingMsg').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const resp = await fetch(`${API}/admin/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await resp.json();
    if (data.success) {
      localStorage.setItem('admin_token', data.token);
      window.location.href = '/admin/dashboard.html';
    } else {
      showError(data.message || '登录失败');
    }
  } catch (err) {
    showError('网络错误，请确认服务正在运行');
  }
  document.getElementById('loadingMsg').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
